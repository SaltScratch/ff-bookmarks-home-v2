<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 20px;
        }
        .page-header h1 {
            margin: 0;
            font-size: 26px;
        }
        #settings-button {
            padding: 8px 14px;
            border: 1px solid #007bff;
            border-radius: 8px;
            background: #007bff;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        #settings-button:hover {
            background: #0056cc;
        }
        .bookmark-folder {
            margin-bottom: 30px;
            border-top: 1px solid #e5e7eb;
            padding-top: 20px;
        }
        .bookmark-folder:first-child {
            border-top: none;
            padding-top: 0;
        }
        .bookmark-folder + .bookmark-folder {
            margin-top: 28px;
        }
        .folder-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .bookmark-folder h2 {
            margin: 0;
            font-size: 24px;
            text-align: center;
        }
        .folder-toggle-button {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: #007bff;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .folder-toggle-button:hover {
            background: #0056cc;
        }
        .folder-content {
            margin-left: 10px;
            margin-top: 8px;
        }
        .bookmark-grid {
            display: grid;
            gap: 12px;
        }
        .bookmark-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 12px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            background: #fff;
            transition: background 0.15s ease, border-color 0.15s ease;
            min-height: 110px;
            text-align: center;
        }
        .bookmark-item:hover {
            background: #f6faff;
            border-color: #cce4ff;
        }
        .bookmark-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            text-decoration: none;
            color: #007bff;
        }
        .bookmark-link:hover {
            text-decoration: none;
        }
        .bookmark-favicon {
            width: 32px;
            height: 32px;
            margin-bottom: 10px;
            border-radius: 6px;
            object-fit: contain;
            flex-shrink: 0;
        }
        .bookmark-title {
            display: -webkit-box;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            white-space: normal;
        }
        .edit-button,
        .delete-button {
            position: absolute;
            top: 8px;
            width: 28px;
            height: 28px;
            border: none;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .edit-button {
            left: 8px;
            color: #007bff;
        }
        .edit-button:hover {
            background: #eff6ff;
            color: #0056cc;
        }
        .delete-button {
            right: 8px;
            color: #c00;
        }
        .delete-button:hover {
            background: #fff;
            color: #900;
        }
        .set-icon-button {
            position: absolute;
            bottom: 8px;
            left: 8px;
            width: 28px;
            height: 28px;
            border: none;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            font-size: 16px;
            color:#0056cc;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .set-icon-button:hover {
            background: #eff6ff;
        }
    </style>
</head>
<body>
    <div class="page-header">
        <h1>Bookmarks Home</h1>
        <button id="settings-button">Settings</button>
    </div>
    <div id="bookmarks-container"></div>
    <script src="homepage.js"></script>
</body>
</html>
