<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Home Settings</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        label {
            display: block;
            margin-bottom: 10px;
        }
        input {
            width: 80px;
            padding: 8px;
            margin-bottom: 20px;
        }
        button {
            padding: 8px 16px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #status {
            margin-top: 12px;
            color: green;
        }
    </style>
</head>
<body>
    <h1>Bookmark Home Settings</h1>
    <label for="root-folder">Root folder name:</label>
    <input id="root-folder" type="text" placeholder="Speed Dial" />
    <label for="column-count">Number of columns:</label>
    <input id="column-count" type="number" min="1" max="10" step="1" />
    <label for="timezone">Timezone:</label>
    <input id="timezone" type="text" placeholder="Australia/Perth" style="width: 200px;" />
    <button id="save">Save</button>
    <div id="status"></div>
    <script src="options.js"></script>
</body>
</html>
