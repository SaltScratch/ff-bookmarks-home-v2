<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Home Settings</title>
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <h1>Bookmark Home Settings</h1>
    <label for="root-folder">Root folder:</label>
    <select id="root-folder"></select>
    <label for="timezone">Timezone:</label>
    <input id="timezone" type="text" list="timezone-list" placeholder="Search timezone…" />
    <datalist id="timezone-list"></datalist>
    <label for="weather-city">Weather city:</label>
    <div class="city-search-wrapper">
        <input id="weather-city" type="text" placeholder="Search city…" autocomplete="off" />
        <button id="clear-city" type="button" title="Clear city">✕</button>
        <div id="city-search-results" class="city-search-results"></div>
    </div>
    <button id="save">Save</button>
    <button id="back-to-home">← Back to Home</button>
    <div id="status"></div>
    <script src="options.js"></script>
</body>
</html>
